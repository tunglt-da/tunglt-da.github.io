<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Tung Le</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>

                    <li class="nav-item"><a class="nav-link" href="experience.html">Experience</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="sticky-nav-wrapper"></div>

    <section class="page-header">
        <div class="container">
            <h1>Get In Touch</h1>
            <p class="lead">I'd love to hear from you</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card border-0 shadow" style="background:var(--dark-card); border:1px solid rgba(71,85,105,0.3)!important; border-radius:var(--radius);">
                        <div class="card-body p-4">
                            <form id="contactForm" class="contact-form">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <input type="text" name="name" class="form-control" placeholder="Your Name" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <input type="email" name="email" class="form-control" placeholder="Your Email" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <input type="text" name="subject" class="form-control" placeholder="Subject">
                                </div>
                                <div class="mb-4">
                                    <textarea name="message" class="form-control" rows="5" placeholder="Your Message" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary-custom">Send Message</button>
                                <div id="responseContainer" class="mt-3"></div>
                            </form>
                        </div>
                    </div>

                    <div class="row mt-5 text-center">
                        <div class="col-md-4 mb-3 mb-md-0">
                            <div class="contact-card py-4 px-3">
                                <i class="fas fa-envelope fs-3 mb-3"></i>
                                <h5>Email</h5>
                                <p class="mb-0">tunglt.da@gmail.com</p>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3 mb-md-0">
                            <div class="contact-card py-4 px-3">
                                <i class="fas fa-map-marker-alt fs-3 mb-3"></i>
                                <h5>Location</h5>
                                <p class="mb-0">Ha Noi, Viet Nam</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="contact-card py-4 px-3">
                                <i class="fas fa-phone fs-3 mb-3"></i>
                                <h5>Phone</h5>
                                <p class="mb-0">+84 (0) 367 432 197</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center">
        <div class="container">
            <div class="mb-3">
                <a href="https://www.linkedin.com/in/tunglt-da" class="social-link" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/tunglt-da" class="social-link" target="_blank"><i class="fab fa-github"></i></a>
                <a href="mailto:tunglt.da@gmail.com" class="social-link"><i class="fas fa-envelope"></i></a>
            </div>
            <p class="mb-0" style="font-size:0.85rem;">&copy; Le Thanh Tung. All rights reserved.</p>
        </div>
    </footer>

    <a href="#" id="back-to-top" class="shadow"><i class="fas fa-arrow-up"></i></a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Sending...';

            const formData = new FormData(this);
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://script.google.com/macros/s/AKfycby84q_uLbtZVZEOGqXclTGn5n5yoV7Jaeluy4qbYPSaUfTskQLCh3JUiNiHb8Q8Umng/exec');

            xhr.onload = function() {
                let response;
                try { response = JSON.parse(xhr.responseText); } catch { response = { success: false, message: "Error: Response error" }; }
                showAlert(response.success, response.message);
                if (response.success) document.getElementById('contactForm').reset();
            };
            xhr.onerror = function() { showAlert(false, "Error: Connection error."); };
            xhr.send(formData);

            function showAlert(success, message) {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert alert-${success ? 'success' : 'danger'} mt-3`;
                alertDiv.innerHTML = message;
                document.getElementById('responseContainer').prepend(alertDiv);
                setTimeout(() => { alertDiv.style.opacity = '0'; setTimeout(() => alertDiv.remove(), 500); }, 3000);
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
